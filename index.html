// Iconos: usamos lucide (vainilla) que expone window.lucide.icons
// Cada ícono es un array [tag, attrs, children] que convertimos a SVG
const LU = (window.lucide && window.lucide.icons) || {};

function makeIcon(iconName) {
  // Devuelve un componente React que renderiza el SVG del ícono
  return function IconComp({ size = 24, color = 'currentColor', strokeWidth = 2, style = {}, className = '' }) {
    const data = LU[iconName];
    if (!data) {
      // Fallback: un cuadrado vacío
      return <svg width={size} height={size} viewBox="0 0 24 24" />;
    }
    // data es [tag, attrs, children] o array de [tag, attrs] para los hijos
    const children = Array.isArray(data[2]) ? data[2] : [];
    return (
      <svg
        width={size}
        height={size}
        viewBox="0 0 24 24"
        fill="none"
        stroke={color}
        strokeWidth={strokeWidth}
        strokeLinecap="round"
        strokeLinejoin="round"
        style={style}
        className={className}
      >
        {children.map((child, i) => {
          const [tag, attrs] = child;
          return React.createElement(tag, { key: i, ...attrs });
        })}
      </svg>
    );
  };
}

// Helpers
const formatCOP = (n) =>
  '$ ' + Math.round(n || 0).toLocaleString('es-CO', { minimumFractionDigits: 0, maximumFractionDigits: 0 });

const calcVet = (pub, m) => Math.round(pub * (1 - m / 100));

const getPrice = (p, listKey, mVet) => {
  if (listKey === 'pv') return p.pv;
  if (listKey === 'vet') return calcVet(p.pub, mVet || 5);
  return p.pub;
};

const normalizePhotoURL = (url) => {
  if (!url) return null;
  url = String(url).trim();
  if (!url) return null;
  // Si es link estándar de Drive (.../file/d/ID/view o .../uc?...id=ID)
  // lo convertimos al formato lh3.googleusercontent.com que sí funciona embed
  let id = null;
  let m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) id = m[1];
  if (!id) {
    m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m) id = m[1];
  }
  if (id) return 'https://lh3.googleusercontent.com/d/' + id + '=w1000';
  return url;
};

// Data Loader
async function fetchCSV(url) {
  const resp = await fetch(url + '&_t=' + Date.now());
  const text = await resp.text();
  return new Promise((resolve, reject) => {
    Papa.parse(text, {
      header: true, skipEmptyLines: true,
      complete: (r) => resolve(r.data), error: reject,
    });
  });
}

// =================== API (Apps Script) ===================
async function apiCall(action, params = {}) {
  const cfg = window.INVERELITE_CONFIG;
  if (!cfg || !cfg.URL_API) throw new Error('URL_API no configurada');
  // Apps Script no permite headers personalizados sin CORS preflight,
  // así que usamos POST con text/plain (que NO dispara preflight)
  const url = cfg.URL_API;
  const body = JSON.stringify({ action, ...params });
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: body,
    redirect: 'follow',
  });
  const text = await resp.text();
  let json;
  try { json = JSON.parse(text); }
  catch (e) { throw new Error('Respuesta inválida del API: ' + text.substring(0, 200)); }
  if (!json.ok) throw new Error(json.error || 'Error desconocido del API');
  return json.data;
}

async function fetchVendedores() {
  const cfg = window.INVERELITE_CONFIG;
  if (!cfg.URL_VENDEDORES) return [];
  try {
    const rows = await fetchCSV(cfg.URL_VENDEDORES);
    return rows
      .filter(r => r.Nombre && (r.Activo || '').toUpperCase() === 'SI')
      .map(r => r.Nombre);
  } catch (e) {
    console.warn('No se pudieron cargar vendedores:', e);
    return [];
  }
}

async function loadAllData() {
  const cfg = window.INVERELITE_CONFIG;
  if (!cfg || !cfg.URL_PRODUCTOS || cfg.URL_PRODUCTOS.includes('PEGAR_AQUI')) {
    throw new Error('CONFIG_MISSING');
  }
  const [productosRaw, categoriasRaw, configRaw, vendedores] = await Promise.all([
    fetchCSV(cfg.URL_PRODUCTOS),
    fetchCSV(cfg.URL_CATEGORIAS),
    fetchCSV(cfg.URL_CONFIG),
    fetchVendedores(),
  ]);

  const productos = productosRaw
    .filter(p => (p.Activo || '').toUpperCase() === 'SI' && p.ID)
    .map(p => ({
      id: p.ID,
      nombre: p.Nombre || '',
      proveedor: p.Proveedor || '',
      marca: p.Marca || '',
      categoria: p.Categoria || '',
      presentacion: p.Presentacion || '',
      pv: parseInt((p.Precio_PV || '0').toString().replace(/[^0-9]/g, '')) || 0,
      pub: parseInt((p.Precio_Pub || '0').toString().replace(/[^0-9]/g, '')) || 0,
      iva: parseInt(p.IVA_Incluido || p.IVA || '0') || 0,
      descComercial: p.Descripcion_Comercial || '',
      descTecnica: p.Descripcion_Tecnica || '',
      foto: normalizePhotoURL(p.Foto_URL),
    }));

  const categorias = categoriasRaw
    .filter(c => c.key)
    .map(c => ({
      key: c.key, nombre: c.nombre || c.key,
      orden: parseInt(c.orden || '99'),
      color: c.color || '#666666',
      icono: c.icono || 'package',
    }))
    .sort((a, b) => a.orden - b.orden);

  const config = {};
  configRaw.forEach(row => {
    if (row.clave) config[row.clave] = row.valor || '';
  });

  return { productos, categorias, config, vendedores };
}

// Login Modal
function LoginModal({ show, onClose, onLogin, password }) {
  const [input, setInput] = useState('');
  const [error, setError] = useState('');
  if (!show) return null;

  const submit = () => {
    if (input === password) { onLogin(); setInput(''); setError(''); }
    else { setError('Contraseña incorrecta'); }
  };

  return (
    <div className="fixed inset-0 z-[70] flex items-center justify-center p-4"
      style={{ backgroundColor: 'rgba(15,30,61,0.7)' }} onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl"
        onClick={(e) => e.stopPropagation()}>
        <div className="flex justify-center mb-4">
          <div className="w-14 h-14 rounded-full flex items-center justify-center"
            style={{ backgroundColor: C.cream }}>
            <Lock size={24} style={{ color: C.gold }} />
          </div>
        </div>
        <h3 className="text-xl font-semibold text-center mb-1"
          style={{ fontFamily: "'Fraunces', serif", color: C.navyDeep }}>Acceso del equipo</h3>
        <p className="text-xs text-center mb-5" style={{ color: C.muted }}>
          Ingresa la contraseña para acceder a listas de precios y cotizaciones.
        </p>
        <input type="password" value={input}
          onChange={(e) => { setInput(e.target.value); setError(''); }}
          onKeyDown={(e) => e.key === 'Enter' && submit()}
          placeholder="Contraseña" autoFocus
          className="w-full px-4 py-3 rounded-lg border text-sm outline-none mb-2"
          style={{ borderColor: error ? '#B54545' : C.border }} />
        {error && <div className="text-xs mb-2" style={{ color: '#B54545' }}>{error}</div>}
        <div className="flex gap-2 mt-3">
          <button onClick={onClose} className="flex-1 px-4 py-2.5 rounded-lg text-sm font-medium"
            style={{ border: `1px solid ${C.border}`, color: C.navy }}>Cancelar</button>
          <button onClick={submit} className="flex-1 px-4 py-2.5 rounded-lg text-sm font-medium"
            style={{ backgroundColor: C.navyDeep, color: C.paper }}>Ingresar</button>
        </div>
      </div>
    </div>
  );
}

// Quote Builder
function QuoteBuilder({ products, categories, config, company, vendedores, quoteItems, setQuoteItems, onSaved }) {
  const [cliente, setCliente] = useState({ nombre: '', documento: '', telefono: '', email: '', direccion: '' });
  const [vendedor, setVendedor] = useState(vendedores[0] || '');
  const [priceList, setPriceList] = useState('pub');
  const [notas, setNotas] = useState('');
  const [showPreview, setShowPreview] = useState(false);
  const [browserOpen, setBrowserOpen] = useState(false);
  const [browserSearch, setBrowserSearch] = useState('');
  const [browserCat, setBrowserCat] = useState('todas');
  const [saving, setSaving] = useState(false);
  const [savedId, setSavedId] = useState(null);
  const margenVet = parseFloat(config.margen_veterinario || '5');

  const [quoteNumber] = useState(() => {
    const now = new Date();
    return `COT-${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}-${String(Math.floor(Math.random() * 999)).padStart(3, '0')}`;
  });

  useEffect(() => {
    setQuoteItems(items => items.map(item => {
      const p = products.find(pp => pp.id === item.id);
      return p ? { ...item, precio: getPrice(p, priceList, margenVet) } : item;
    }));
  }, [priceList, margenVet, products]);

  const browserResults = useMemo(() => products.filter(p => {
    const ms = !browserSearch || p.nombre.toLowerCase().includes(browserSearch.toLowerCase()) ||
      p.id.toLowerCase().includes(browserSearch.toLowerCase());
    const mc = browserCat === 'todas' || p.categoria === browserCat;
    return ms && mc;
  }), [browserSearch, browserCat, products]);

  const addProduct = (p) => {
    const existing = quoteItems.find(it => it.id === p.id);
    if (existing) {
      setQuoteItems(items => items.map(it => it.id === p.id ? { ...it, cantidad: it.cantidad + 1 } : it));
    } else {
      setQuoteItems(items => [...items, {
        id: p.id, nombre: p.nombre, presentacion: p.presentacion, categoria: p.categoria,
        cantidad: 1, precio: getPrice(p, priceList, margenVet), iva: p.iva,
      }]);
    }
  };

  const updateItem = (id, field, value) =>
    setQuoteItems(items => items.map(it => it.id === id ? { ...it, [field]: value } : it));
  const removeItem = (id) =>
    setQuoteItems(items => items.filter(it => it.id !== id));
  const clearAll = () => {
    if (!confirm('¿Limpiar toda la cotización?')) return;
    setQuoteItems([]);
    setCliente({ nombre: '', documento: '', telefono: '', email: '', direccion: '' });
    setNotas('');
  };

  const totals = useMemo(() => {
    const total = quoteItems.reduce((s, it) => s + it.cantidad * it.precio, 0);
    const ivaByRate = {};
    quoteItems.forEach(it => {
      if (it.iva > 0) {
        const k = `${it.iva}%`;
        const ivaIn = it.cantidad * it.precio * it.iva / (100 + it.iva);
        ivaByRate[k] = (ivaByRate[k] || 0) + ivaIn;
      }
    });
    return { total, ivaByRate };
  }, [quoteItems]);

  const handleSave = async () => {
    if (!cliente.nombre.trim()) { alert('Ingresa al menos el nombre del cliente.'); return; }
    if (!vendedor) { alert('Selecciona el vendedor.'); return; }
    if (quoteItems.length === 0) { alert('Agrega al menos un producto.'); return; }
    setSaving(true);
    try {
      const result = await apiCall('saveCotizacion', {
        vendedor: vendedor,
        cliente_nombre: cliente.nombre,
        cliente_documento: cliente.documento,
        cliente_telefono: cliente.telefono,
        cliente_email: cliente.email,

  const shareUrl = `${window.location.origin}${window.location.pathname}?p=${producto.id}`;
  const shareText = `🌾 *${producto.nombre}*\n${producto.presentacion}${producto.proveedor ? '\n' + producto.proveedor : ''}\n\n💰 ${formatCOP(producto.pub)} (IVA ${producto.iva === 0 ? 'excluido' : 'incluido'})\n\nVer más: ${shareUrl}\n\n_Cotiza con ${company.nombreCorto}_`;

  return (
    <div className="fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-6"

            <Copy size={16} /> Copiar solo el link
          </button>
        </div>
      </div>
    </div>
  );
}

// ============ COTIZACIONES VIEW ============
function CotizacionesView({ onReabrir, refreshKey, company }) {
  const [cotizaciones, setCotizaciones] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState('');
  const [estadoFilter, setEstadoFilter] = useState('todas');
  const [converting, setConverting] = useState(null);

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const data = await apiCall('listCotizaciones');
      setCotizaciones((data || []).reverse()); // más recientes primero
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { load(); }, [load, refreshKey]);

  const filtered = useMemo(() => cotizaciones.filter(c => {
    const ms = !search ||
      (c.Cliente_Nombre || '').toLowerCase().includes(search.toLowerCase()) ||
      (c.ID || '').toLowerCase().includes(search.toLowerCase()) ||
      (c.Vendedor || '').toLowerCase().includes(search.toLowerCase());
    const me = estadoFilter === 'todas' || c.Estado === estadoFilter;
    return ms && me;
  }), [cotizaciones, search, estadoFilter]);

  const handleConvertir = async (cot) => {
    if (!confirm(`¿Convertir la cotización ${cot.ID} en pedido?`)) return;
    setConverting(cot.ID);
    try {
      const result = await apiCall('convertToPedido', { cotizacion_id: cot.ID });
      alert(`Pedido creado: ${result.id}`);
      load();
    } catch (e) {
      alert('Error: ' + e.message);
    } finally {
      setConverting(null);
    }
  };

  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div className="mb-8">
        <div className="flex items-baseline gap-3 mb-2">
          <span className="text-xs tracking-[0.2em] uppercase font-medium" style={{ color: C.gold }}>
            Mis Cotizaciones
          </span>
          <div className="flex-1 h-px" style={{ backgroundColor: C.border }} />
          <button onClick={load} className="text-xs flex items-center gap-1" style={{ color: C.muted }}>
            <RefreshCw size={12} /> Refrescar
          </button>
        </div>

                      disabled={converting === cot.ID}
                      className="px-3 py-2 rounded text-xs font-medium disabled:opacity-50"
                      style={{ backgroundColor: C.gold, color: C.navyDeep }}>

  );
}

// ============ PEDIDOS VIEW ============
function PedidosView({ refreshKey }) {
  const [pedidos, setPedidos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState('');
  const [estadoFilter, setEstadoFilter] = useState('todos');
  const [updating, setUpdating] = useState(null);
  const [expanded, setExpanded] = useState(null);

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const data = await apiCall('listPedidos');
      setPedidos((data || []).reverse());
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { load(); }, [load, refreshKey]);

  const filtered = useMemo(() => pedidos.filter(p => {
    const ms = !search ||
      (p.Cliente_Nombre || '').toLowerCase().includes(search.toLowerCase()) ||
      (p.ID || '').toLowerCase().includes(search.toLowerCase()) ||
      (p.Vendedor || '').toLowerCase().includes(search.toLowerCase());
    const me = estadoFilter === 'todos' || p.Estado === estadoFilter;
    return ms && me;
  }), [pedidos, search, estadoFilter]);

  const cambiarEstado = async (pedido, nuevoEstado) => {
    setUpdating(pedido.ID);
    try {
      await apiCall('updateEstadoPedido', { pedido_id: pedido.ID, estado: nuevoEstado });
      load();
    } catch (e) {
      alert('Error: ' + e.message);
    } finally {
      setUpdating(null);
    }
  };

  const estadoColor = (estado) => {
    if (estado === 'Pendiente') return { bg: '#FFF4D6', fg: '#7A5A1A' };
    if (estado === 'Facturado') return { bg: '#DEE9F5', fg: '#2D5A8E' };
    if (estado === 'Entregado') return { bg: '#E0F4E0', fg: '#2D7A2D' };
    return { bg: C.borderSoft, fg: C.muted };
  };

  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div className="mb-8">
        <div className="flex items-baseline gap-3 mb-2">
          <span className="text-xs tracking-[0.2em] uppercase font-medium" style={{ color: C.gold }}>
            Pedidos
          </span>
          <div className="flex-1 h-px" style={{ backgroundColor: C.border }} />
          <button onClick={load} className="text-xs flex items-center gap-1" style={{ color: C.muted }}>
            <RefreshCw size={12} /> Refrescar
          </button>
        </div>
        <h1 className="text-3xl sm:text-4xl font-semibold tracking-tight mb-3"
          style={{ fontFamily: "'Fraunces', serif", color: C.navyDeep }}>
          Pedidos en proceso
        </h1>
      </div>

      <div className="flex flex-col sm:flex-row gap-3 mb-5">
        <div className="flex-1 flex items-center gap-2 px-3 py-2 rounded-md border bg-white"
          style={{ borderColor: C.border }}>
          <Search size={14} style={{ color: C.muted }} />
          <input type="text" placeholder="Buscar por cliente, código o vendedor..."
            value={search} onChange={e => setSearch(e.target.value)}
            className="flex-1 bg-transparent outline-none text-sm" />
        </div>
        <select value={estadoFilter} onChange={e => setEstadoFilter(e.target.value)}
          className="px-3 py-2 rounded-md border text-sm outline-none bg-white"
          style={{ borderColor: C.border }}>
          <option value="todos">Todos los estados</option>
          <option value="Pendiente">Pendiente</option>
          <option value="Facturado">Facturado</option>
          <option value="Entregado">Entregado</option>
        </select>
      </div>

      {loading ? (
        <div className="text-center py-12" style={{ color: C.muted }}>
          <div className="loading-spinner mx-auto mb-3"></div>
          Cargando pedidos...
        </div>
      ) : error ? (
        <div className="p-4 rounded-md text-sm"
          style={{ backgroundColor: '#FEE2E2', color: '#B54545' }}>
          Error: {error}
        </div>
      ) : filtered.length === 0 ? (
        <div className="text-center py-16 rounded-xl border-2 border-dashed"
          style={{ color: C.muted, borderColor: C.border }}>
          <Package size={48} style={{ opacity: 0.4, margin: '0 auto 1rem' }} />
          <p>No hay pedidos todavía.</p>
          <p className="text-xs mt-2">Crea cotizaciones y conviértelas en pedidos.</p>
        </div>
      ) : (
        <div className="space-y-3">
          {filtered.map(ped => {
            const col = estadoColor(ped.Estado);
            const isExpanded = expanded === ped.ID;
            let productos = [];
            try { productos = JSON.parse(ped.Productos_JSON || '[]'); } catch (e) {}
            return (
              <div key={ped.ID} className="bg-white rounded-xl border overflow-hidden"
                style={{ borderColor: C.border }}>
                <div className="p-4 flex flex-col sm:flex-row gap-3 sm:items-center">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-1">
                      <span className="text-[10px] font-mono" style={{ color: C.muted }}>{ped.ID}</span>
                      <span className="text-[10px] px-2 py-0.5 rounded font-semibold"
                        style={{ backgroundColor: col.bg, color: col.fg }}>{ped.Estado}</span>
                      <span className="text-[10px]" style={{ color: C.muted }}>
                        ← {ped.Cotizacion_ID}
                      </span>
                    </div>
                    <div className="font-medium text-sm" style={{ color: C.navyDeep }}>
                      {ped.Cliente_Nombre}
                    </div>
                    <div className="text-xs" style={{ color: C.muted }}>
                      {ped.Fecha} · {ped.Hora} · {ped.Vendedor}
                      {ped.Cliente_Telefono && ` · Tel: ${ped.Cliente_Telefono}`}
                    </div>
                  </div>
                  <div className="flex items-center gap-3 sm:flex-shrink-0">
                    <div className="text-right">
                      <div className="text-[10px]" style={{ color: C.muted }}>
                        {ped.Num_Productos} productos · {ped.Num_Unidades} und
                      </div>
                      <div className="font-semibold text-base" style={{ color: C.navyDeep }}>
                        {formatCOP(ped.Total)}
                      </div>
                    </div>
                    <button onClick={() => setExpanded(isExpanded ? null : ped.ID)}
                      className="px-3 py-2 rounded text-xs font-medium"
                      style={{ border: `1px solid ${C.border}`, color: C.navy }}>
                      <Eye size={14} />
                    </button>
                  </div>
                </div>
                <div className="px-4 pb-3 flex flex-wrap gap-1.5">
                  <span className="text-[10px] uppercase tracking-wider self-center mr-1"
                    style={{ color: C.muted }}>Cambiar a:</span>
                  {['Pendiente', 'Facturado', 'Entregado'].map(estado => {
                    const eCol = estadoColor(estado);
                    const isCurrent = ped.Estado === estado;
                    return (
                      <button key={estado}
                        onClick={() => !isCurrent && cambiarEstado(ped, estado)}
                        disabled={isCurrent || updating === ped.ID}
                        className="px-2.5 py-1 rounded-full text-[11px] font-medium disabled:opacity-40 disabled:cursor-not-allowed"
                        style={{
                          backgroundColor: isCurrent ? eCol.bg : 'transparent',
                          color: isCurrent ? eCol.fg : C.navy,
                          border: `1px solid ${isCurrent ? eCol.bg : C.border}`,
                        }}>
                        {updating === ped.ID ? '⏳' : estado}
                      </button>
                    );
                  })}
                </div>
                {isExpanded && (
                  <div className="px-4 pb-4 border-t pt-3" style={{ borderColor: C.borderSoft }}>
                    <div className="text-[10px] uppercase tracking-wider mb-2 font-semibold" style={{ color: C.muted }}>
                      Productos del pedido
                    </div>
                    <div className="space-y-1">
                      {productos.map(it => (
                        <div key={it.id} className="flex justify-between text-xs">
                          <div>
                            <span className="font-mono mr-2" style={{ color: C.muted }}>{it.id}</span>
                            <span style={{ color: C.navyDeep }}>{it.nombre}</span>
                            <span style={{ color: C.muted }}> · {it.presentacion}</span>
                          </div>
                          <div className="text-right whitespace-nowrap" style={{ color: C.navyDeep }}>
                            {it.cantidad} × {formatCOP(it.precio)} = <span className="font-semibold">{formatCOP(it.cantidad * it.precio)}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                    {ped.Observaciones && (
                      <div className="mt-3 pt-3 border-t" style={{ borderColor: C.borderSoft }}>
                        <div className="text-[10px] uppercase tracking-wider mb-1 font-semibold" style={{ color: C.muted }}>
                          Observaciones
                        </div>
                        <div className="text-xs" style={{ color: C.ink }}>{ped.Observaciones}</div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// Main App
function App() {
  const [view, setView] = useState('catalog');
  const [isStaff, setIsStaff] = useState(false);
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [shareProduct, setShareProduct] = useState(null);
  const [toast, setToast] = useState({ show: false, message: '' });
  const [mobileMenu, setMobileMenu] = useState(false);
  const [showLogin, setShowLogin] = useState(false);
  const [quoteItems, setQuoteItems] = useState([]);

  const [data, setData] = useState({ productos: [], categorias: [], config: {}, vendedores: [] });
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [refreshKey, setRefreshKey] = useState(0);

  const loadData = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const result = await loadAllData();
      setData(result);
    } catch (e) {
      console.error(e);
      if (e.message === 'CONFIG_MISSING') {
        setError('Falta configurar las URLs del Google Sheet en config.js');
      } else {
        setError('Verifica que las URLs del Sheet estén publicadas correctamente. Detalle: ' + e.message);
      }
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const pid = params.get('p');
    if (pid && data.productos.length > 0) {
      const p = data.productos.find(pp => pp.id === pid);
      if (p) setSelectedProduct(p);
    }
  }, [data.productos]);

  const showToast = (m) => {
    setToast({ show: true, message: m });
    setTimeout(() => setToast({ show: false, message: '' }), 2200);
  };

  const company = useMemo(() => ({
    razonSocial: data.config.razon_social || 'Elite Inversiones Agropecuarias SAS',
    nombreCorto: data.config.nombre_corto || 'InverElite',
    email: data.config.email || '',
    telefono: data.config.telefono || '',
    direccion: data.config.direccion || '',
    nit: data.config.nit || '',
    slogan: data.config.slogan || 'Insumos agropecuarios de confianza',
  }), [data.config]);

  const staffPassword = data.config.password_equipo || 'inverelite2026';

  const handleAddToQuote = (producto) => {
    const margenVet = parseFloat(data.config.margen_veterinario || '5');
    const existing = quoteItems.find(it => it.id === producto.id);
    if (existing) {
      setQuoteItems(items => items.map(it =>
        it.id === producto.id ? { ...it, cantidad: it.cantidad + 1 } : it));
    } else {
      setQuoteItems(items => [...items, {
        id: producto.id, nombre: producto.nombre, presentacion: producto.presentacion,
        categoria: producto.categoria, cantidad: 1, precio: producto.pub, iva: producto.iva,
      }]);
    }
    setSelectedProduct(null);
    showToast('Producto agregado');
    setTimeout(() => setView('quote'), 400);
  };

  if (loading) {
    return (
      <div className="loading-screen">
        <div className="loading-spinner"></div>
        <div style={{ fontFamily: "'Fraunces', serif", color: C.navyDeep, fontSize: '18px' }}>
          Cargando InverElite...
        </div>
      </div>
    );
  }

  if (error) return <ErrorScreen message={error} onRetry={loadData} />;

  const navItems = isStaff
    ? [
        { key: 'catalog', label: 'Catálogo', Icon: LayoutGrid },
        { key: 'prices', label: 'Precios', Icon: List },
        { key: 'quote', label: 'Cotización', Icon: FileCheck, badge: quoteItems.length },
        { key: 'cotizaciones', label: 'Mis Cotizaciones', Icon: FileText },
        { key: 'pedidos', label: 'Pedidos', Icon: ShoppingCart },
      ]
    : [{ key: 'catalog', label: 'Catálogo', Icon: LayoutGrid }];

  return (
    <div style={{ backgroundColor: C.cream, minHeight: '100vh', fontFamily: "'Manrope', sans-serif" }}>
      <header className="sticky top-0 z-40 border-b no-print"
        style={{ backgroundColor: C.paper + 'ee', borderColor: C.border, backdropFilter: 'blur(10px)' }}>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="flex items-center justify-between h-16">
            <button onClick={() => setView('catalog')}><Logo size={36} /></button>
            <nav className="hidden md:flex items-center gap-1">
              {navItems.map(item => {
                const active = view === item.key;
                const IconC = item.Icon;
                return (
                  <button key={item.key} onClick={() => setView(item.key)}
                    className="px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"
                    style={{
                      backgroundColor: active ? C.navyDeep : 'transparent',
                      color: active ? C.paper : C.navy,
                    }}>
                    <IconC size={16} /> {item.label}
                    {item.badge > 0 && (
                      <span className="rounded-full text-[10px] font-semibold flex items-center justify-center"
                        style={{
                          backgroundColor: C.gold, color: C.navyDeep,
                          minWidth: '20px', height: '20px', padding: '0 6px'
                        }}>{item.badge}</span>
                    )}
                  </button>
                );
              })}
              {isStaff ? (
                <button onClick={() => { setIsStaff(false); setView('catalog'); showToast('Sesión cerrada'); }}
                  className="ml-2 px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2"
                  style={{ color: C.muted, border: `1px solid ${C.border}` }}>
                  <LogOut size={14} /> Salir
                </button>
              ) : (
                <button onClick={() => setShowLogin(true)}
                  className="ml-2 px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2"
                  style={{ backgroundColor: C.gold, color: C.navyDeep }}>
                  <Lock size={14} /> Equipo
                </button>
              )}
            </nav>
            <button className="md:hidden p-2" onClick={() => setMobileMenu(!mobileMenu)}
              style={{ color: C.navy }}>
              {mobileMenu ? <X size={22} /> : <Menu size={22} />}
            </button>
          </div>
        </div>
        {mobileMenu && (
          <div className="md:hidden border-t" style={{ borderColor: C.border, backgroundColor: C.paper }}>
            {navItems.map(item => {
              const active = view === item.key;
              const IconC = item.Icon;
              return (
                <button key={item.key}
                  onClick={() => { setView(item.key); setMobileMenu(false); }}
                  className="w-full px-6 py-3 text-left text-sm font-medium flex items-center gap-3 border-b"
                  style={{
                    backgroundColor: active ? C.navyDeep : 'transparent',
                    color: active ? C.paper : C.navy,
                    borderColor: C.borderSoft,
                  }}>
                  <IconC size={16} /> {item.label}
                  {item.badge > 0 && (
                    <span className="ml-auto rounded-full text-[10px] font-semibold flex items-center justify-center"
                      style={{
                        backgroundColor: C.gold, color: C.navyDeep,
                        minWidth: '22px', height: '20px', padding: '0 6px'
                      }}>{item.badge}</span>
                  )}
                </button>
              );
            })}
            {isStaff ? (
              <button onClick={() => { setIsStaff(false); setView('catalog'); setMobileMenu(false); showToast('Sesión cerrada'); }}
                className="w-full px-6 py-3 text-left text-sm font-medium flex items-center gap-3"
                style={{ color: C.muted }}>
                <LogOut size={14} /> Cerrar sesión
              </button>
            ) : (
              <button onClick={() => { setShowLogin(true); setMobileMenu(false); }}
                className="w-full px-6 py-3 text-left text-sm font-medium flex items-center gap-3"
                style={{ backgroundColor: C.gold, color: C.navyDeep }}>
                <Lock size={14} /> Acceso equipo
              </button>
            )}
          </div>
        )}
      </header>

      <main>
        {view === 'catalog' && (
          <CatalogView products={data.productos} categories={data.categorias} isStaff={isStaff}
            onOpen={setSelectedProduct} onShare={setShareProduct} />
        )}
        {view === 'prices' && isStaff && (
          <PriceListView products={data.productos} categories={data.categorias}
            config={data.config} company={company} />
        )}
        {view === 'quote' && isStaff && (
          <QuoteBuilder products={data.productos} categories={data.categorias}
            config={data.config} company={company}
            vendedores={data.vendedores || []}
            quoteItems={quoteItems} setQuoteItems={setQuoteItems}
            onSaved={() => setRefreshKey(k => k + 1)} />
        )}
        {view === 'cotizaciones' && isStaff && (
          <CotizacionesView refreshKey={refreshKey} company={company}
            onReabrir={(cot) => {
              try {
                const items = JSON.parse(cot.Productos_JSON || '[]');
                const itemsWithCat = items.map(it => {
                  const p = data.productos.find(pp => pp.id === it.id);
                  return { ...it, categoria: p ? p.categoria : '' };
                });
                setQuoteItems(itemsWithCat);
                setView('quote');
                showToast('Cotización cargada en el constructor');
              } catch (e) {
                alert('Error al reabrir: ' + e.message);
              }
            }} />
        )}
        {view === 'pedidos' && isStaff && (
          <PedidosView refreshKey={refreshKey} />
        )}
      </main>

      <footer className="mt-20 pt-10 pb-8 border-t no-print"
        style={{ borderColor: C.border, backgroundColor: C.paper }}>
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="flex flex-col sm:flex-row justify-between items-start gap-6">
            <div>
              <Logo size={32} />
              <p className="text-xs mt-3" style={{ color: C.muted }}>
                {company.razonSocial}<br />{company.email}
              </p>
            </div>
            <div className="text-xs" style={{ color: C.muted }}>
              <div style={{ fontFamily: "'Fraunces', serif", fontStyle: 'italic', color: C.navy }}>
                {company.slogan}
              </div>
            </div>
          </div>
        </div>
      </footer>

      <ProductDetail producto={selectedProduct} categories={data.categorias} config={data.config}
        isStaff={isStaff} onClose={() => setSelectedProduct(null)}
        onShare={(p) => { setSelectedProduct(null); setShareProduct(p); }}
        onAddToQuote={handleAddToQuote} />
      <ShareModal producto={shareProduct} onClose={() => setShareProduct(null)}
        onToast={showToast} company={company} />
      <LoginModal show={showLogin} onClose={() => setShowLogin(false)}
        onLogin={() => { setIsStaff(true); setShowLogin(false); showToast('Sesión iniciada'); }}
        password={staffPassword} />
      <Toast message={toast.message} show={toast.show} />
    </div>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
