<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InverElite — Catálogo</title>
  <meta name="description" content="Catálogo de insumos agropecuarios InverElite" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { margin: 0; font-family: 'Manrope', sans-serif; background: #FAF7F0; }
    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      #pdf-preview { box-shadow: none !important; max-width: 100% !important; padding: 0 !important; }
      @page { size: A4; margin: 14mm; }
    }
    .print-only { display: none; }
    input:focus, textarea:focus { border-color: #C9A449 !important; }
    .line-clamp-2 { overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; }
    .loading-screen {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 1rem;
      background: #FAF7F0; z-index: 9999;
    }
    .loading-spinner {
      width: 40px; height: 40px; border: 3px solid #E8E3D8;
      border-top-color: #C9A449; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div style="font-family: 'Fraunces', serif; color: #0F1E3D; font-size: 18px;">Cargando InverElite...</div>
    </div>
  </div>

  <script src="config.js"></script>
  <script type="text/babel" data-presets="react" src="app.js"></script>
</body>
</html>
